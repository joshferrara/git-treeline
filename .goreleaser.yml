version: 2

builds:
  - binary: git-treeline
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/git-treeline/git-treeline/cmd.Version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: git-treeline
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/git-treeline/git-treeline
    description: "Worktree environment manager — isolated ports, databases, and services across parallel development environments"
    license: MIT
    install: |
      bin.install "git-treeline"
      bin.install_symlink "git-treeline" => "gtl"

      generate_completions_from_executable(bin/"git-treeline", "completion")
      generate_completions_from_executable(bin/"git-treeline", "completion", base_name: "gtl")

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
